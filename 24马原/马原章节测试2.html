<script>
var Q = [{"type": "choice", "points": 2, "question": "「巧妇难为无米之炊」说明了什么哲学道理？", "options": ["主观能动性是万能的", "正确发挥主观能动性依赖于一定的物质条件和物质手段", "客观规律可以被忽略", "意识可以直接创造物质"], "answer": 1, "explanation": "正确发挥人的主观能动性，还要依赖于一定的物质条件和物质手段。没有现实的原材料，人的意识再「巧」也创造不出任何物质的东西。", "pitfall": "这个谚语强调的是物质条件的制约，不是否定主观能动性。"}, {"type": "choice", "points": 2, "question": "人工智能可以做到的是？", "options": ["具备真正的人类情感", "具备社会属性", "对人类理性智能的模拟和扩展", "完全理解自然语言的真实意义"], "answer": 2, "explanation": "人工智能只是对人类理性智能的模拟和扩展，不具备情感、信念、意志，也不具备社会属性。", "pitfall": "人工智能是对理性智能的「模拟」，不是「替代」也不是「超越」。"}, {"type": "choice", "points": 2, "question": "矛盾同一性的正确理解是？", "options": ["矛盾双方完全一致", "矛盾双方相互依存、相互贯通", "矛盾双方永久和谐", "矛盾双方完全没有关系"], "answer": 1, "explanation": "矛盾的同一性是指矛盾着的对立面相互依存、相互贯通的性质和趋势。", "pitfall": "同一性不是没有矛盾，而是矛盾双方在一定条件下相互依存。"}, {"type": "choice", "points": 2, "question": "关于感性认识和理性认识的关系，正确的说法是？", "options": ["感性认识是低级的，应该被抛弃", "理性认识可以不依赖感性认识", "二者相互渗透、相互包含", "理性认识是感性认识的简单相加"], "answer": 2, "explanation": "感性认识和理性认识相互渗透、相互包含，是辩证统一的关系。", "pitfall": "不能说谁低级谁高级，也不能说理性认识是感性认识的简单相加——那是机械反映论。"}, {"type": "choice", "points": 2, "question": "真理绝对性和相对性辩证关系中，错误的观点是？", "options": ["任何真理都既是绝对的又是相对的", "真理的绝对性和相对性相互依存", "真理只是相对的，没有绝对性（相对主义）", "人类认识不断从相对真理走向绝对真理"], "answer": 2, "explanation": "相对主义只承认真理的相对性，否认真理的绝对性，是错误的。真理既是绝对的又是相对的。", "pitfall": "相对主义和绝对主义都是错误的——一个否定绝对性，一个否定相对性。"}, {"type": "choice", "points": 2, "question": "价值的主体性是指？", "options": ["价值完全由客体决定", "价值因人而异，主体不同则价值可能不同", "价值是永恒不变的", "价值与主体无关"], "answer": 1, "explanation": "价值的主体性指价值直接同主体的需要、能力等相关联，主体不同则价值可能不同。", "pitfall": "主体性不等于主观任意性，价值还有客观基础（客观性）。"}, {"type": "choice", "points": 2, "question": "垄断利润实现的途径是？", "options": ["自由竞争市场价格", "垄断组织制定的垄断价格（垄断高价和垄断低价）", "政府固定价格", "国际市场价格"], "answer": 1, "explanation": "垄断利润主要是通过垄断组织制定的垄断价格来实现的，包括垄断高价和垄断低价两种形式。", "pitfall": "垄断价格的产生没有否定价值规律，是价值规律在垄断资本主义阶段的具体体现。"}, {"type": "choice", "points": 2, "question": "资本有机构成提高会导致什么？", "options": ["工人工资提高", "就业增加", "相对过剩人口（失业）", "资本家利润降低"], "answer": 2, "explanation": "随着资本积累，资本有机构成提高，可变资本相对减少，导致相对过剩人口即失业现象。", "pitfall": "资本积累→资本有机构成提高→可变资本相对减少→失业。这是逻辑链条。"}, {"type": "choice", "points": 2, "question": "科技革命的消极影响中，与资本主义制度相关的是？", "options": ["对自然规律认识不够", "科技常被资产阶级用作剥削压迫人民的工具", "缺乏控制手段", "科技本身具有罪恶属性"], "answer": 1, "explanation": "在资本主义条件下，科学技术常常被资产阶级用作剥削压迫人民的工具，这与资本主义制度本身有关。", "pitfall": "注意区分两种情形：一是认识不够/缺乏控制手段，二是资本主义制度性利用。题目问的是后者。"}, {"type": "choice", "points": 2, "question": "「社会发展的必然性造成了一定历史阶段社会发展的基本趋势」说明了什么？", "options": ["人们无法做任何选择", "社会规律为人们的历史选择提供了基础和可能性空间", "英雄人物可以随意改变历史", "历史发展是随机的"], "answer": 1, "explanation": "社会发展的必然性为人们的历史选择提供了基础、范围和可能性空间，这是人们历史选择性的第一层含义。", "pitfall": "必然性不是宿命论——它为选择提供了空间，不是取消了选择。"}, {"type": "choice", "points": 2, "question": "实践探索中出现曲折，应该如何看待？", "options": ["说明社会主义失败了", "不改变社会主义的前进趋势", "证明社会主义理论是错误的", "意味着应该放弃社会主义"], "answer": 1, "explanation": "实践探索中出现某种曲折并不改变社会主义的前进趋势。社会主义是不断探索的过程。", "pitfall": "曲折不等于失败，这是理解社会主义发展规律的关键。"}, {"type": "choice", "points": 2, "question": "从层次上看，远大理想与共同理想的关系是？", "options": ["最终理想与阶段性理想", "全人类理想与全体中国人民理想", "最高纲领与最低纲领", "长远目标与近期目标"], "answer": 2, "explanation": "从层次上看，远大理想与共同理想的关系是最高纲领与最低纲领的关系。", "pitfall": "三组关系不要搞混：时间→最终/阶段性，层次→最高/最低纲领，范围→全人类/全体中国人民。"}, {"type": "choice", "points": 2, "question": "剩余价值转化为资本的过程叫做？", "options": ["资本循环", "资本周转", "资本积累", "资本集中"], "answer": 2, "explanation": "把剩余价值转化为资本，或者说剩余价值的资本化，就是资本积累。", "pitfall": "资本积累≠资本循环（购买→生产→售卖）。积累是剩余价值的资本化，循环是资本的运动形式。"}, {"type": "choice", "points": 2, "question": "下列哪项不属于联系的特点？", "options": ["客观性", "普遍性", "主观性", "条件性"], "answer": 2, "explanation": "联系的特点是客观性、普遍性、多样性、条件性。主观性不是联系的特点——联系是客观的。", "pitfall": "这是一个反向选择题，注意「不属于」。联系没有「主观性」。"}, {"type": "choice", "points": 2, "question": "矛盾的斗争性意味着什么？", "options": ["矛盾双方和谐共处", "矛盾双方相互排斥、相互分离", "矛盾被取消", "矛盾双方完全统一"], "answer": 1, "explanation": "矛盾的斗争性是矛盾对立面相互排斥、相互分离的性质和趋势。", "pitfall": "斗争性不等于对抗——斗争是哲学范畴，不一定是激烈的你死我活。"}, {"type": "choice", "points": 2, "question": "唯物史观和剩余价值理论的两大发现使社会主义发生了什么转变？", "options": ["从空想变为科学", "从科学变为空想", "从理论变为实践", "从一国变为多国"], "answer": 0, "explanation": "由于唯物史观和剩余价值理论的发现，社会主义由空想变为科学。这是马克思主义的两大理论贡献。", "pitfall": ""}, {"type": "choice", "points": 2, "question": "资本循环的售卖阶段，资本采取什么形式？", "options": ["货币资本", "生产资本", "商品资本", "金融资本"], "answer": 2, "explanation": "产业资本在售卖阶段采取商品资本的形式，其职能是实现商品的价值和剩余价值。", "pitfall": "三个阶段对应三种形式：购买阶段→货币资本，生产阶段→生产资本，售卖阶段→商品资本。"}, {"type": "choice", "points": 2, "question": "「发扬历史主动精神」的哲学依据是什么？", "options": ["客观规律决定一切，人无能为力", "尊重客观规律与发挥主观能动性的统一", "人的主观意志决定一切", "历史发展没有规律"], "answer": 1, "explanation": "发扬历史主动精神意味着在尊重客观规律的前提下，充分发挥人的主观能动性。这正是主观能动性与客观规律性辩证统一的体现。", "pitfall": ""}, {"type": "choice", "points": 2, "question": "关于垄断价格和垄断利润，正确的说法是？", "options": ["垄断价格完全由资本家主观决定", "垄断利润否定了价值规律", "垄断利润主要通过垄断价格实现，但没有否定价值规律", "垄断利润只来源于国际市场"], "answer": 2, "explanation": "垄断利润主要通过垄断价格实现，但垄断价格的产生没有否定价值规律，它是价值规律在垄断资本主义阶段作用的具体体现。", "pitfall": ""}, {"type": "choice", "points": 2, "question": "正确认识和运用科学技术的首要条件是什么？", "options": ["提高科技投入", "培养科技人才", "有合理的社会制度保障科学技术的正确运用", "加强国际科技合作"], "answer": 2, "explanation": "正确认识和运用科学技术，首要的就是有合理的社会制度保障科学技术的正确运用，始终坚持使科学技术为人类社会的健康发展服务。", "pitfall": "制度是首要条件，不是投入、人才或合作。这是马克思主义的立场——社会制度决定科技运用的方向。"}, {"type": "tf", "points": 1, "question": "矛盾的同一性意味着矛盾双方完全没有斗争。", "answer": 1, "explanation": "错误。同一性和斗争性是矛盾的两个基本属性，二者同时存在、不可分割。同一性不排斥斗争性。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "价值具有客观性，因此价值与主体无关。", "answer": 1, "explanation": "错误。价值的客观性指价值有其客观基础和来源，但价值同样具有主体性。价值是主体与客体之间的意义关系。", "pitfall": "客观性不等于与主体无关，这是一个容易混淆的点。"}, {"type": "tf", "points": 1, "question": "社会基本矛盾特别是生产力和生产关系的矛盾，决定着社会中其他矛盾的存在和发展。", "answer": 0, "explanation": "正确。这是社会基本矛盾在历史发展中的第二个主要表现。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "人们的历史选择性意味着人们可以随心所欲地选择历史发展道路。", "answer": 1, "explanation": "错误。人们的历史选择受到社会发展的必然性制约，是在一定范围内的选择，不是随心所欲的。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "资本积累加剧了社会财富占有的两极分化。", "answer": 0, "explanation": "正确。资本积累不但是社会财富占有两极分化的重要原因，而且是资本主义社会失业现象产生的根源。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "产业资本的三种职能形式只需要在空间上并存，不需要在时间上继起。", "answer": 1, "explanation": "错误。两个前提缺一不可：三种职能形式必须在空间上并存，同时必须在时间上继起。", "pitfall": "并存和继起是两个同时需要满足的条件。"}, {"type": "tf", "points": 1, "question": "社会主义实践是一个不断探索的过程，开拓奋进的精神状态是推进社会主义发展的必要条件。", "answer": 0, "explanation": "正确。推进社会主义实践发展必须有开拓奋进的精神状态，因为社会主义是不断探索的过程。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "远大理想和共同理想是相互对立、不可兼得的。", "answer": 1, "explanation": "错误。远大理想和共同理想是辩证统一的关系，不是对立的。不能因为远大理想而否定共同理想，也不能因为共同理想而忘记远大理想。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "科学技术在资本主义条件下总是为全人类造福的。", "answer": 1, "explanation": "错误。在资本主义条件下，科学技术常常被资产阶级用作剥削压迫人民的工具，并非都能使人摆脱贫困。", "pitfall": ""}, {"type": "tf", "points": 1, "question": "理性认识依赖于感性认识，这是认识论的唯物论。", "answer": 0, "explanation": "正确。理性认识依赖于感性认识，体现了认识来源于实践、来源于感性经验的唯物主义认识论路线。", "pitfall": ""}, {"type": "fill", "points": 2, "question": "人类意识是____、____、____的统一体，而人工智能只模拟了理性智能。", "answer": [["知", "情", "意"], ["知", "情", "意"]], "explanation": "人类意识是知（认知）、情（情感）、意（意志）的统一体。", "pitfall": ""}, {"type": "fill", "points": 2, "question": "真理的____性是指真理主客观统一的确定性和发展的无限性；真理的____性指人们认识的有限度和不完善。", "answer": [["绝对", "相对"], ["绝对", "相对"]], "explanation": "真理的绝对性和相对性。", "pitfall": ""}, {"type": "fill", "points": 2, "question": "矛盾双方____、____造成双方力量发展的不平衡，为对立面的转化、事物的质变创造条件。", "answer": [["斗争", "促进"], ["斗争", "促进"]], "explanation": "矛盾双方的斗争促进双方力量变化，造成不平衡。", "pitfall": ""}, {"type": "fill", "points": 2, "question": "资本积累的本质是资本家不断利用无偿占有的工人创造的____来扩大自己的资本规模。", "answer": "剩余价值", "explanation": "资本积累的本质就是剩余价值的资本化。", "pitfall": ""}, {"type": "fill", "points": 2, "question": "垄断价格包括____和____两种形式。", "answer": [["垄断高价", "垄断低价"], ["垄断低价", "垄断高价"]], "explanation": "垄断价格包括垄断高价（卖出时的高价）和垄断低价（买入时的低价）。", "pitfall": ""}, {"type": "fill", "points": 2, "question": "社会形态更替的过程是一个____与____相统一的过程。", "answer": [["主观能动性", "客观规律性"], ["客观规律性", "主观能动性"]], "explanation": "社会形态更替是主观能动性与客观规律性相统一的过程。", "pitfall": ""}, {"type": "fill", "points": 2, "question": "产业资本的三个阶段依次是：____阶段、____阶段和____阶段。", "answer": [["购买", "生产", "售卖"], ["购买", "生产", "售卖"]], "explanation": "产业资本的三个阶段：购买阶段→生产阶段→售卖阶段。", "pitfall":
