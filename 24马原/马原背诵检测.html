stion": "「资本积累是资本家通过节俭和勤劳积累财富的结果」——对吗？", "answer": 1, "explanation": "❌ 错！资本积累的本质是<strong>无偿占有工人创造的剩余价值</strong>，不是节俭的结果。", "pitfall": ""}, {"type": "short", "points": 0, "question": "【论述框架】如何用真理绝对性/相对性原理说明「马克思主义既要坚持又要发展」？请默写答题框架。", "answer": -1, "explanation": "<strong>框架</strong>：①解释绝对性和相对性的概念；②辩证关系（两重性+发展性）；③马克思主义是真理→有绝对性→<strong>必须坚持</strong>；④马克思主义没穷尽真理→有相对性→<strong>必须发展</strong>；⑤反对「过时论」（相对主义）和「僵化论」（绝对主义）。", "pitfall": "坚持=绝对性，发展=相对性，这是核心逻辑。"}, {"type": "short", "points": 0, "question": "【论述框架】如何用矛盾同一性与斗争性原理说明「既要和谐又要发扬斗争精神」？", "answer": -1, "explanation": "<strong>框架</strong>：①解释同一性（依存+贯通）和斗争性（排斥+分离）；②斗争性的两个作用（造成不平衡+决定性力量）；③和谐=同一性的体现→要把握；④斗争=推动发展的动力→要发扬；⑤二者统一：和谐不是无原则妥协，斗争是为了更好的和谐。", "pitfall": "关键：和谐≠取消斗争，斗争≠否定和谐。"}, {"type": "fill", "points": 0, "question": "联系的四个特点速记口诀：「客普多条」——客=____、普=____、多=____、条=____。", "answer": [["客观性", "普遍性", "多样性", "条件性"], ["客观性", "普遍性", "多样性", "条件性"]], "explanation": "客观性、普遍性、多样性、条件性。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "价值的四个特性速记口诀：「主客多历」——主=____、客=____、多=____、历=____。", "answer": [["主体性", "客观性", "多维性", "社会历史性"], ["主体性", "客观性", "多维性", "社会历史性"]], "explanation": "主体性、客观性、多维性、社会历史性。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "产业资本速记口诀：「购产销、空并时继」——购=____阶段、产=____阶段、销=____阶段；空=____、时=____。", "answer": [["购买", "生产", "售卖", "并存", "继起"], ["购买", "生产", "售卖", "并存", "继起"]], "explanation": "购买→生产→售卖；空间并存+时间继起。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "两大发现使社会主义从空想变科学：____和____。", "answer": [["唯物史观", "剩余价值理论"], ["剩余价值理论", "唯物史观"]], "explanation": "唯物史观 + 剩余价值理论 = 马克思两大发现。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "远大理想=____理想（时间）、____纲领（层次）、____理想（范围）；共同理想=____理想（时间）、____纲领（层次）、____理想（范围）。", "answer": [["最终", "最高", "全人类", "阶段性", "最低", "全体中国人民"], ["最终", "最高", "全人类", "阶段性", "最低", "全体中国人民"]], "explanation": "远：最终/最高/全人类；共：阶段性/最低/全体中国人民。", "pitfall": "三组对应，不能串位。"}];
