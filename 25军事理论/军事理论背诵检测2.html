ints": 0, "question": "现代军事指挥系统中，C4ISR的「S」代表通信。", "answer": 1, "explanation": "错误！S = Surveillance（监视），C = Communications（通信）。", "pitfall": "经典陷阱！"}, {"type": "tf", "points": 0, "question": "现代军事侦察监视技术只能在白天发挥作用。", "answer": 1, "explanation": "错误！红外、雷达、卫星等可全天候工作。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "19世纪末20世纪初，各主要资本主义国家先后从自由资本主义发展到垄断资本主义，进入帝国主义阶段。", "answer": 0, "explanation": "正确。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "党的二十大报告指出，我国「国家安全体系和能力全面加强，基本实现国防和军队现代化」。", "answer": 0, "explanation": "正确。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "新时代的中国国家安全是总体的、系统的、相对的大安全。", "answer": 0, "explanation": "正确。", "pitfall": ""}, {"type": "short", "points": 0, "question": "【简答】论述新军事革命的内涵。", "answer": -1, "explanation": "新军事革命是指当代军事领域内<strong>军队组织体制、建设训练和军事技术、战争形态、军事理论、作战方式、后勤保障</strong>等方面在整体上同时发生的<strong>根本性变化</strong>。其核心驱动力是<strong>信息技术</strong>，推动战争向信息化、智能化转型。", "pitfall": "关键词：整体、同时、根本性变化。"}, {"type": "short", "points": 0, "question": "【简答】简述信息化战争的主要特征（6点）。", "answer": -1, "explanation": "①武器装备—<strong>信息支撑</strong>；②战场能量释放—<strong>信息主导</strong>；③战场空间—<strong>多维一体</strong>（陆海空天+网络电磁+认知）；④作战目标—三大系统；⑤争夺焦点—<strong>制信息权</strong>；⑥作战形态—联合作战。", "pitfall": "六个特征，围绕「信息」展开。"}, {"type": "short", "points": 0, "question": "【简答】战争大致可划分为哪几个历史时期？", "answer": -1, "explanation": "①原始社会末期的战争；②奴隶社会时期的战争；③封建社会时期的战争；④资本主义上升时期的战争；⑤帝国主义和无产阶级革命时代的战争。", "pitfall": "五个时期按历史阶段排列。"}, {"type": "short", "points": 0, "question": "【简答】简述中国古代军事思想的基本概念。", "answer": -1, "explanation": "中国古代军事思想是<strong>中国在奴隶社会、封建社会时期</strong>，各阶级、集团及其军事家和军事论著者对于<strong>战争与军队问题</strong>的理性认识。它随着社会的前进、战争的发展而不断深化。代表作：《孙子兵法》。", "pitfall": ""}, {"type": "short", "points": 0, "question": "【简答】简述外国军事思想的概念。", "answer": -1, "explanation": "外国军事思想是<strong>除中国以外的世界其他国家</strong>政治家、军事家和思想家关于<strong>战争、国防和军队</strong>等问题的理性认识。在古希腊和古罗马获得显著发展。代表：克劳塞维茨《战争论》。", "pitfall": ""}, {"type": "short", "points": 0, "question": "【简答】简述机械化和信息化战争的区别。", "answer": -1, "explanation": "<strong>机械化战争</s
