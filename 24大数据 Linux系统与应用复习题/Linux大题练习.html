<script>
var Q = [{"type": "short", "points": 0, "question": "【大题1】在Linux中完成tree软件的安装、查看版本、卸载。请写出全部命令。（3步）", "answer": -1, "explanation": "① <strong>yum install -y tree</strong>（安装tree）\n② <strong>yum info tree</strong> 或 <strong>rpm -q tree</strong>（查看版本）\n③ <strong>yum remove -y tree</strong>（卸载）", "pitfall": "三步都要写 -y 参数。"}, {"type": "short", "points": 0, "question": "【大题2】假设下载的软件包名为 tree-1.6.0-10.el7.x86_64，请解释各部分含义。", "answer": -1, "explanation": "<strong>1.6.0</strong> = 软件版本号\n<strong>10</strong> = 发布次数/修订版本\n<strong>el7</strong> = 适合的操作系统（Enterprise Linux 7）\n<strong>x86_64</strong> = CPU架构（64位）", "pitfall": "四个部分都要解释。"}, {"type": "short", "points": 0, "question": "【大题3】简述vim编辑器的三种模式及切换方式。", "answer": -1, "explanation": "<strong>命令模式</strong>（默认，按Esc进入）：移动光标、复制粘贴、删除\n<strong>插入模式</strong>（按 i/a/o 进入）：编辑文本\n<strong>末行模式</strong>（按 : 进入）：保存(:w)、退出(:q)、查找\n\n切换：vim文件 → 命令模式 → i → 插入模式 → Esc → 命令模式 → : → 末行模式", "pitfall": "三种模式名称和进入方式都要写全。"}, {"type": "short", "points": 0, "question": "【大题4】文件a.txt在当前目录下，请写出命令：\n(1) 查看a.txt的后3行\n(2) 查看a.txt的前5行\n(3) 查看a.txt中所有空行并显示行号\n(4) 查看以'm'开头的行并显示行号\n(5) 查看以'!'结尾的行并显示行号", "answer": -1, "explanation": "(1) <strong>tail -n 3 a.txt</strong>\n(2) <strong>head -n 5 a.txt</strong>\n(3) <strong>grep -n '^$' a.txt</strong>\n(4) <strong>grep -n '^m' a.txt</strong>\n(5) <strong>grep -n '!$' a.txt</strong>", "pitfall": "空行用 ^$，行首用 ^，行尾用 $。"}, {"type": "short", "points": 0, "question": "【大题5】写出at调度命令：\n(1) 两分钟后将'I Love Linux'追加到a.txt末尾\n(2) 三分钟后将a.txt内容替换为'I love Linux'", "answer": -1, "explanation": "(1) <strong>at now + 2 minutes</strong> → 输入 echo 'I Love Linux' >> a.txt → Ctrl+D\n(2) <strong>at now + 3 minutes</strong> → 输入 echo 'I love Linux' > a.txt → Ctrl+D\n\n注意：追加用 >>，覆盖用 >。", "pitfall": ">> 追加，> 覆盖替换。别搞混！"}, {"type": "short", "points": 0, "question": "【大题6】写出crontab调度命令：\n(1) 每月10号和20号的14:30清空a.txt内容\n(2) 每周六到周日14:30清空a.txt内容", "answer": -1, "explanation": "(1) <strong>30 14 10,20 * * cat /dev/null > /路径/a.txt</strong>\n格式：分 时 日 月 周 命令\n(2) <strong>30 14 * * 6-7 cat /dev/null > /路径/a.txt</strong>\n\ncrontab格式记忆：分时日月周。", "pitfall": "crontab格式不能搞错：分(0-59) 时(0-23) 日(1-31) 月(1-12) 周(0-7, 0和7都是周日)。"}, {"type": "short", "points": 0, "question": "【大题7】在「当前位置」不可跳转目录的前提下，写出以下命令（相对路径）：\n(1) 按目录结构图创建所有文件夹和.txt文件\n(2) 将test4移动到「下载」中（绝对路径）\n(3) 将test1、b.txt压缩为data1.tar", "answer": -1, "explanation": "(1) <strong>mkdir -p 各级目录</strong>，然后 <strong>touch 文件名.txt</strong>\n(2) <strong>mv test4 /home/用户名/下载/</strong>\n(3) <strong>tar -cvf data1.tar test1 b.txt</strong>\n\n相对路径=从当前目录开始，绝对路径=从 / 开始。", "pitfall": "mkdir -p 创建多级目录，tar -cvf 创建压缩包。"}, {"type": "short", "points": 0, "question": "【大题8】写出以下命令：\n(1) 将3test3追加到data1.tar（绝对路径）\n(2) 查看桌面上以test结尾的文件（相对路径）\n(3) 删除test1，成功输出success，失败输出false", "answer": -1, "explanation": "(1) <strong>tar -rvf /路径/data1.tar 3test3</strong>（-r = append追加）\n(2) <strong>find 桌面/ -name '*test'</strong>\n(3) <strong>rm -f test1 && echo success || echo false</strong>\n\n&& = 成功才执行后面，|| = 失败才执行后面。", "pitfall": "追加用 -rvf 不是 -cvf！-c 会覆盖原有包。"}, {"type": "short", "points": 0, "question": "【大题9】写出以下命令：\n(1) 将test1复制到「文档」中，成功输出success否则false（绝对路径）\n(2) 将b.txt和2test压缩为data1.zip（相对路径）\n(3) 将data1.zip解压到「下载」目录并命名为data1", "answer": -1, "explanation": "(1) <strong>cp -r /路径/test1 /路径/文档/ && echo success || echo false</strong>\n(2) <strong>zip data1.zip b.txt 2test</strong>\n(3) <strong>unzip data1.zip -d /路径/下载/data1</strong>\n\n-d 指定解压目标目录。", "pitfall": "zip打包，unzip -d解压到指定目录。"}, {"type": "short", "points": 0, "question": "【大题10】某软件公司项目组：美工组(Amy)、前端组(Tony, Tom)、后端组(Jack)、测试组(Linda, Lily)。master为项目经理。写出以下命令：\n(1) 为所有成员创建账号并加入对应组\n(2) 将Amy、Tony、Jack、Linda设为各组组长", "answer": -1, "explanation": "(1) 创建组：<strong>groupadd 美工组; groupadd 前端开发组; groupadd 后端开发组; groupadd 测试组</strong>\n创建用户并加入组：<strong>useradd -G 美工组 Amy; useradd -G 前端开发组 Tony; useradd -G 前端开发组 Tom; useradd -G 后端开发组 Jack; useradd -G 测试组 Linda; useradd -G 测试组 Lily</strong>\n(2) 设组长：<strong>gpasswd -A Amy 美工组; gpasswd -A Tony 前端开发组; gpasswd -A Jack 后端开发组; gpasswd -A Linda 测试组</strong>", "pitfall": "gpasswd -A 设组长，-a 添加成员，-d 删除成员。"}, {"type": "short", "points": 0, "question": "【大题11】接上题，写出以下命令：\n(1) Lily请假，封锁其账号\n(2) Tom被借调，从前端开发组删除\n(3) 项目结束后删除所有组和成员账号", "answer": -1, "explanation": "(1) 封锁：<strong>usermod -L Lily</strong> 或 <strong>passwd -l Lily</strong>\n(2) 从组删除：<strong>gpasswd -d Tom 前端开发组</strong>\n(3) 删除用户（含家目录）：<strong>userdel -r Amy; userdel -r Tony; userdel -r Tom; userdel -r Jack; userdel -r Linda; userdel -r Lily</strong>\n删除组：<strong>groupdel 美工组; groupdel 前端开发组; groupdel 后端开发组; groupdel 测试组</strong>", "pitfall": "userdel -r 删除用户+家目录，不加-r只删用户。gpasswd -d 从组删除。"}, {"type": "short", "points": 0, "question": "【大题12】在根目录下创建test文件夹，仅测试组成员可读、写、执行，其余人无任何权限。写出完整命令。", "answer": -1, "explanation": "<strong>mkdir /test</strong>\n<strong>chown :测试组 /test</strong>（或 chgrp 测试组 /test）\n<strong>chmod 770 /test</strong>\n\n770 = rwx(7) rwx(7) ---(0)\n属主rwx + 属组rwx + 其他人无权限。", "pitfall": "770的含意：7=4(r)+2(w)+1(x)，0=无权限。属主和属组都是7，其他人0。"}, {"type": "short", "points": 0, "question": "【大题13】master安装了两块硬盘（5G和10G），要用LVM扩充内存。写出以下命令：\n(1) 创建卷组storage\n(2) 切割约160M的逻辑卷v0（利用基本单元）\n(3) 格式化为ext4并挂载到/Linuxprobe", "answer": -1, "explanation": "(1) 先创建PV：<strong>pvcreate /dev/sdb /dev/sdc</strong>\n再创建VG：<strong>vgcreate storage /dev/sdb /dev/sdc</strong>\n(2) <strong>lvcreate -L 160M -n v0 storage</strong>\n(3) <strong>mkfs.ext4 /dev/storage/v0</strong>\n<strong>mkdir -p /Linuxprobe</strong>\n<strong>mount /dev/storage/v0 /Linuxprobe</strong>\n\nLVM三部曲：pvcreate → vgcreate → lvcreate。", "pitfall": "顺序不能错：先PV→再VG→再LV。格式化用mkfs.ext4。"}, {"type": "short", "points": 0, "question": "【大题14】master安装了一块10G硬盘，用fdisk分区。写出以下操作：\n(1) 创建2G主分区（写出fdisk内的按键步骤）\n(2) 创建3G逻辑分区\n(3) 格式化为ext4并分别挂载到/disk1和/disk5", "answer": -1, "explanation": "进入fdisk：<strong>fdisk /dev/sdb</strong>\n(1) 主分区：按 <strong>n</strong> → <strong>p</strong> → 输入+2G → 按 <strong>w</strong> 保存\n(2) 逻辑分区：再运行 <strong>fdisk /dev/sdb</strong> → 按 <strong>n</strong> → <strong>e</strong>（先创建扩展分区用剩余空间）→ 再 <strong>n</strong> → <strong>l</strong>（逻辑分区）→ 输入+3G → 按 <strong>w</strong>\n(3) 格式化：<strong>mkfs.ext4 /dev/sdb1; mkfs.ext4 /dev/sdb5</strong>\n挂载：<strong>mkdir -p /disk1 /disk5; mount /dev/sdb1 /disk1; mount /dev/sdb5 /disk5</strong>", "pitfall": "fdisk内：n=new, p=primary, e=extended, l=logical, w=write保存。主分区编号1-4，逻辑分区从5开始。"}, {"type": "short", "points": 0, "question": "【大题15】解释管道符 | 和命令连接符 && 、|| 的区别，并各举一例。", "answer": -1, "explanation": "<strong>管道符 |</strong>：把前一个命令的<strong>输出</strong>传给后一个命令作为<strong>输入</strong>。\n例：<strong>cat a.txt | grep 'error' | wc -l</strong>（查看包含error的行数）\n\n<strong>&&</strong>：前一条<strong>成功</strong>才执行后一条。\n例：<strong>rm -f test && echo success</strong>\n\n<strong>||</strong>：前一条<strong>失败</strong>才执行后一条。\n例：<strong>rm -f test || echo false</strong>\n\n组合：<strong>命令 && echo success || echo false</strong>", "pitfall": "管道传数据，&& || 判成败。本质不同！"}];
