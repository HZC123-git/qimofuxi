var Q = [{"type": "fill", "points": 0, "question": "在Linux中安装tree软件：____", "answer": "yum install -y tree", "explanation": "yum install -y tree。 -y 表示自动确认。", "pitfall": "注意：写 yum install tree 也给分，但 -y 更完整。"}, {"type": "fill", "points": 0, "question": "查看tree软件的版本信息：____", "answer": [["yum info tree"], ["rpm -q tree"]], "explanation": "yum info tree 或 rpm -q tree。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "卸载tree软件：____", "answer": "yum remove -y tree", "explanation": "yum remove -y tree。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "创建多级目录 /a/b/c（父目录不存在）：____", "answer": "mkdir -p /a/b/c", "explanation": "-p 参数递归创建父目录。", "pitfall": "没有 -p 且父目录不存在会报错。"}, {"type": "fill", "points": 0, "question": "将 test1 移动到「下载」目录（绝对路径）：____", "answer": [["mv /某路径/test1 /下载"], ["mv test1 /下载"]], "explanation": "mv /原路径/test1 /目标路径。绝对路径从根目录 / 开始。", "pitfall": "绝对路径以 / 开头！"}, {"type": "fill", "points": 0, "question": "将 test1、b.txt 打包压缩为 data1.tar（相对路径）：____", "answer": "tar -cvf data1.tar test1 b.txt", "explanation": "tar -cvf 包名.tar 文件1 文件2。c=create, v=verbose, f=file。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "将 3test3 追加到已有的 data1.tar 中：____", "answer": "tar -rvf data1.tar 3test3", "explanation": "r=append 追加模式。", "pitfall": "追加用 -rvf，不是 -cvf！-c 会覆盖。"}, {"type": "fill", "points": 0, "question": "查看桌面上以 test 结尾的文件：____", "answer": [["find /桌面 -name '*test'"], ["find 桌面 -name '*test'"]], "explanation": "find 路径 -name '模式'。*test 匹配以test结尾的文件。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "删除 test1，成功输出success，失败输出false（一条命令）：____", "answer": "rm -f test1 && echo success || echo false", "explanation": "&& 前面成功才执行后面；|| 前面失败才执行后面。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "查看 a.txt 的后3行：____", "answer": "tail -n 3 a.txt", "explanation": "head -n 查看前N行，tail -n 查看后N行。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "查看 a.txt 中所有空行并显示行号：____", "answer": "grep -n '^$' a.txt", "explanation": "^$ 匹配空行（^行首$行尾，中间什么都没有=空行），-n 显示行号。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "查看以 'm' 开头的行并显示行号：____", "answer": "grep -n '^m' a.txt", "explanation": "^m = 以m开头的行。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "两分钟后将 'I Love Linux' 追加到 a.txt 末尾（at调度）：____", "answer": [["at now + 2 minutes", "at now + 2 min"]], "explanation": "at now + 2 minutes → 输入 echo 'I Love Linux' >> a.txt → Ctrl+D。", "pitfall": "注意：at 后面跟时间，然后在交互界面输入要执行的命令。"}, {"type": "fill", "points": 0, "question": "每月10号和20号14:30清空a.txt（crontab）：____", "answer": "30 14 10,20 * * 命令", "explanation": "分 时 日 月 周：30 14 10,20 * * > /路径/a.txt 或 cat /dev/null > /路径/a.txt。", "pitfall": "格式：分时日月周。10号和20号用逗号分隔 10,20。"}, {"type": "fill", "points": 0, "question": "每周六到周日14:30清空a.txt（crontab）：____", "answer": "30 14 * * 6-7 命令", "explanation": "周：6=周六，7=周日（或0=周日）。6-7表示周六到周日。", "pitfall": "0和7都表示周日。"}, {"type": "fill", "points": 0, "question": "查看 a.txt 的前5行：____", "answer": "head -n 5 a.txt", "explanation": "head 默认显示前10行，-n 指定行数。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "查看以 '!' 结尾的行并显示行号（用管道符）：____", "answer": [["cat a.txt | grep -n '!$'"], ["grep -n '!$' a.txt"]], "explanation": "$ 表示行尾，'!$' = 以!结尾。管道符版：cat a.txt | grep -n '!$'。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "三分钟后将 a.txt 内容替换为 'I love Linux'（at调度）：____", "answer": [["at now + 3 minutes", "at now + 3 min"]], "explanation": "at now + 3 minutes → echo 'I love Linux' > a.txt → Ctrl+D。注意是 >（覆盖）不是 >>（追加）。", "pitfall": "> 覆盖，>> 追加。题目说「替换」= 覆盖 = >。"}, {"type": "fill", "points": 0, "question": "将 b.txt 和 2test 压缩为 data1.zip：____", "answer": "zip data1.zip b.txt 2test", "explanation": "zip 包名.zip 文件列表。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "将 data1.zip 解压到「下载」目录并命名为 data1：____", "answer": "unzip data1.zip -d /下载/data1", "explanation": "unzip 包名.zip -d 目标路径。-d 指定解压目录。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "创建用户组「测试组」：____", "answer": "groupadd 测试组", "explanation": "groupadd 组名。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "将用户 Amy 设为美工组组长：____", "answer": "gpasswd -A Amy 美工组", "explanation": "gpasswd -A 用户名 组名。A=Administrator。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "封锁 Lily 的账号：____", "answer": [["usermod -L Lily"], ["passwd -l Lily"]], "explanation": "usermod -L（Lock）或 passwd -l。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "将 Tom 从前端开发组中删除：____", "answer": "gpasswd -d Tom 前端开发组", "explanation": "gpasswd -d 用户名 组名。d=delete。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "创建 /test 目录，仅测试组成员可读写执行，其余人无权访问：____", "answer": [["mkdir /test && chown :测试组 /test && chmod 770 /test"], ["mkdir /test; chgrp 测试组 /test; chmod 770 /test"]], "explanation": "mkdir 创建目录 → chown :组名 改所属组 → chmod 770（属主+属组rwx，其他人无权限）。", "pitfall": "770 = rwx(7=4+2+1) rwx(7) ---(0)。"}, {"type": "fill", "points": 0, "question": "删除用户 Tom（含家目录）：____", "answer": "userdel -r Tom", "explanation": "-r 同时删除家目录和邮件。", "pitfall": "不加 -r 只删用户不删家目录。"}, {"type": "fill", "points": 0, "question": "创建卷组 storage（使用 /dev/sdb 和 /dev/sdc）：____", "answer": "vgcreate storage /dev/sdb /dev/sdc", "explanation": "vgcreate 卷组名 物理卷列表。前提：已 pvcreate。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "在 storage 中切割 160M 逻辑卷 v0：____", "answer": "lvcreate -L 160M -n v0 storage", "explanation": "lvcreate -L 大小 -n 逻辑卷名 卷组名。-L 指定大小。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "将逻辑卷 v0 格式化为 ext4 并挂载到 /Linuxprobe：____ 然后 ____", "answer": [["mkfs.ext4 /dev/storage/v0", "mount /dev/storage/v0 /Linuxprobe"], ["mkfs -t ext4 /dev/storage/v0", "mount /dev/storage/v0 /Linuxprobe"]], "explanation": "格式化：mkfs.ext4 设备路径。挂载：mount 设备 挂载点。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "使用 fdisk 为 /dev/sdb 创建2G主分区（关键步骤）：进入fdisk后按____选主分区，按____输入大小，按____保存。", "answer": [["n", "p", "w"], ["n", "p", "w"]], "explanation": "fdisk /dev/sdb → n(new) → p(primary) → 输入大小 → w(write保存)。", "pitfall": ""}, {"type": "fill", "points": 0, "question": "将 /dev/sdb1 格式化为 ext4 并挂载到 /disk1：____ && ____", "answer": "mkfs.ext4 /dev/sdb1 && mount /dev/sdb1 /disk1", "explanation": "mkfs.ext4 格式化 → mount 挂载。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "vim 的三种模式是：命令模式、编辑模式、末行模式。按 i 进入编辑模式，按 Esc 回到命令模式，按 : 进入末行模式。", "answer": 0, "explanation": "正确。命令模式(默认)→i→插入(编辑)模式→Esc→命令模式→:→末行模式。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "tar -rvf 可以向已有 tar 包中追加新文件。", "answer": 0, "explanation": "正确。-r = append 追加。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "crontab 可以用来设置一次性定时任务。", "answer": 1, "explanation": "错误。crontab 用于周期性任务。一次性任务用 at。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "at now + 2 minutes 表示两分钟后执行一次任务。", "answer": 0, "explanation": "正确。at 用于一次性定时执行。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "grep -n '^$' 用于查找空行并显示行号。", "answer": 0, "explanation": "正确。^$ 匹配空行。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "userdel 用户名 会同时删除用户的家目录。", "answer": 1, "explanation": "错误。不加 -r 只删除用户账号，家目录保留。userdel -r 才会同时删除家目录。", "pitfall": "考试常见陷阱！userdel vs userdel -r。"}, {"type": "tf", "points": 0, "question": "chmod 770 表示：属主rwx，属组rwx，其他人无权限。", "answer": 0, "explanation": "正确。7=4+2+1=rwx，0=无权限。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "LVM 的创建顺序是：vgcreate → pvcreate → lvcreate。", "answer": 1, "explanation": "错误。正确顺序：pvcreate(物理卷) → vgcreate(卷组) → lvcreate(逻辑卷)。", "pitfall": "顺序不能乱！先有PV才有VG，先有VG才能LV。"}, {"type": "tf", "points": 0, "question": "crontab 格式中，0和7都表示周日。", "answer": 0, "explanation": "正确。周字段：0=周日，7=周日，1=周一...6=周六。", "pitfall": ""}, {"type": "tf", "points": 0, "question": "echo 'hello' > file 和 echo 'hello' >> file 效果是一样的。", "answer": 1, "explanation": "错误。> 是覆盖写入，>> 是追加写入。完全不同！", "pitfall": "高频考点！> 覆盖，>> 追加。"}];
