<script>
var Q = [{"type": "short", "points": 0, "question": "【大题1·信号量】某系统中有4个进程A、B、C、D：A执行完毕后B和C才能开始；B和C都执行完毕后D才能开始。请用信号量实现，写出(1)信号量定义及初值 (2)各进程伪代码。", "answer": -1, "explanation": "<strong>(1)信号量定义</strong>：\nsemaphore sa=0; // B等A\nsemaphore sb=0; // D等B\nsemaphore sc=0; // D等C\n\n<strong>(2)伪代码</strong>：\nA: {执行A; signal(sa);}\nB: {wait(sa); 执行B; signal(sb);}\nC: {wait(sa); 执行C; signal(sc);}\nD: {wait(sb); wait(sc); 执行D;}", "pitfall": "A→B和C用同一个信号量sa；D等B和C都完成需要wait(sb)和wait(sc)两个。"}, {"type": "short", "points": 0, "question": "【大题2·信号量】某系统有6个进程P1~P6：P1→P2,P3；P2→P4；P3→P4,P5；P4,P5→P6。请用信号量实现。", "answer": -1, "explanation": "<strong>信号量</strong>：s12=0, s13=0, s24=0, s34=0, s35=0, s46=0, s56=0（每对前驱一个信号量）\n\nP1: {执行P1; signal(s12); signal(s13);}\nP2: {wait(s12); 执行P2; signal(s24);}\nP3: {wait(s13); 执行P3; signal(s34); signal(s35);}\nP4: {wait(s24); wait(s34); 执行P4; signal(s46);}\nP5: {wait(s35); 执行P5; signal(s56);}\nP6: {wait(s46); wait(s56); 执行P6;}", "pitfall": "P4需要同时等P2和P3，所以wait(s24)+wait(s34)。P6同理。"}, {"type": "short", "points": 0, "question": "【大题3·生产者消费者】某工厂仓库最多存放N个零件，生产线X生产零件X，生产线Y生产零件Y；车间M取零件X，车间N取零件Y。仓库满时生产线等待，无对应零件时车间等待。请写出信号量定义和各进程伪代码。", "answer": -1, "explanation": "<strong>信号量</strong>：\nmutex=1（互斥访问仓库）\nempty=N（仓库空位数）\nfullX=0（零件X数量）\nfullY=0（零件Y数量）\n\n生产线X: {生产X; wait(empty); wait(mutex); 放入X; signal(mutex); signal(fullX);}\n生产线Y: {生产Y; wait(empty); wait(mutex); 放入Y; signal(mutex); signal(fullY);}\n车间M: {wait(fullX); wait(mutex); 取X; signal(mutex); signal(empty); 装配;}\n车间N: {wait(fullY); wait(mutex); 取Y; signal(mutex); signal(empty); 装配;}", "pitfall": "signal顺序：先signal(mutex)再signal(full)，防止死锁。wait顺序：先wait(full)再wait(mutex)。"}, {"type": "short", "points": 0, "question": "【大题4·调度】4个进程同时到达：P1(服务时间8,优先级3)、P2(服务时间4,优先级1)、P3(服务时间2,优先级4)、P4(服务时间6,优先级2)。分别用FCFS和非抢占优先级调度，计算各进程周转时间和平均周转时间。", "answer": -1, "explanation": "<strong>FCFS(按P1→P2→P3→P4)</strong>：\nP1: 完成=8, 周转=8\nP2: 完成=12, 周转=12\nP3: 完成=14, 周转=14\nP4: 完成=20, 周转=20\n平均周转=(8+12+14+20)/4=<strong>13.5</strong>\n\n<strong>非抢占优先级(数字小优先)</strong>：\nP2(1): 完成=4, 周转=4\nP4(2): 完成=10, 周转=10\nP1(3): 完成=18, 周转=18\nP3(4): 完成=20, 周转=20\n平均周转=(4+10+18+20)/4=<strong>13</strong>", "pitfall": "带权周转=周转时间/服务时间。FCFS: P1=1, P2=3, P3=7, P4=3.33，平均=3.58。"}, {"type": "short", "points": 0, "question": "【大题5·银行家算法】给出Allocation、Max、Available矩阵。(1)计算Need矩阵；(2)判断系统是否处于安全状态并给出安全序列；(3)P1发出Request=(2,2,2)，系统能否分配？", "answer": -1, "explanation": "(1) Need = Max - Allocation\n(2) 安全检查步骤：\n① 找Need ≤ Work的进程 → 假设完成 → 释放资源Work += Allocation\n② 重复直到所有进程完成或找不到满足条件的进程\n③ 存在安全序列(如P2→P4→P1→P3→P5)则安全\n(3) 试分配后检查安全状态：暂时分配→检查安全→不安全则撤销并让进程等待", "pitfall": "安全检查是循环检查！可能有多条安全序列。只要找到一条就是安全状态。"}, {"type": "short", "points": 0, "question": "【大题6·地址转换】页大小2KB，页表：0→9, 1→3, 2→7, 3→12, 4→5。分别将逻辑地址5200B和12000B转为物理地址，写出计算过程。", "answer": -1, "explanation": "<strong>5200B</strong>：\n页号 = 5200/2048 = 2\n页内偏移 = 5200%2048 = 1104\n块号 = 7（查页表）\n物理地址 = 7×2048 + 1104 = <strong>15440</strong>\n\n<strong>12000B</strong>：\n页号 = 12000/2048 = 5\n页号5 ≥ 页表长度5 → <strong>越界中断！</strong>无法转换。", "pitfall": "页号从0开始，共5页(0~4)，页号5越界。"}, {"type": "short", "points": 0, "question": "【大题7·页面置换】分配3个物理块，页面访问序列1,2,1,2,3,4,3,4。分别用LRU和LFU算法，画出页面变化过程，计算缺页率和缺页次数。", "answer": -1, "explanation": "<strong>LRU（最近最久未使用）</strong>：\n访问1缺→[1]; 2缺→[1,2]; 1不缺; 2不缺; 3缺→替换1→[3,2]; 4缺→替换2→[3,4]; 3不缺; 4不缺\n缺页次数=<strong>4次</strong>，缺页率=<strong>4/8=50%</strong>\n\n<strong>LFU（最少使用）</strong>：\n1缺→[1]; 2缺→[1,2]; 1命中; 2命中; 3缺→替换?→; 4缺→; 3不缺; 4不缺\n缺页次数=<strong>6次</strong>，缺页率=<strong>6/8=75%</strong>\n\n高频考点：LRU优于LFU在此序列。", "pitfall": "LRU和LFU的区别：LRU看最近访问时间，LFU看历史访问次数。"}, {"type": "short", "points": 0, "question": "【大题8·磁盘调度】磁盘200磁道(0~199)，磁头在55，向增大方向移动。访问序列：83,13,44,90,30,67,93,19。分别用SSTF和SCAN算法，写出访问顺序和总移动距离。", "answer": -1, "explanation": "<strong>SSTF</strong>：55→44(11)→30(14)→19(11)→13(6)→67(54)→83(16)→90(7)→93(3)\n总距离：11+14+11+6+54+16+7+3=<strong>122</strong>，平均=<strong>15.25</strong>\n\n<strong>SCAN</strong>：55→67(12)→83(16)→90(7)→93(3)→44(49)→30(14)→19(11)→13(6)\n总距离：12+16+7+3+49+14+11+6=<strong>118</strong>，平均=<strong>14.75</strong>", "pitfall": "SCAN往返但不越端点；C-SCAN单向到端点后直接返回0再开始。"}, {"type": "short", "points": 0, "question": "【大题9·综合】简述死锁的四个必要条件，并用银行家算法说明死锁避免与死锁预防的区别。", "answer": -1, "explanation": "<strong>四个必要条件</strong>：①互斥 ②请求和保持 ③不可抢占 ④循环等待\n\n<strong>死锁预防</strong>：破坏必要条件（如一次性申请所有资源→破坏请求和保持），代价是资源利用率低。\n<strong>死锁避免</strong>（银行家算法）：不破坏条件，而是在分配前判断系统是否仍处于安全状态，安全才分配。需要事先知道进程最大需求。\n\n核心区别：预防=破坏条件（事前硬限制），避免=安全检查（事前软判断）。", "pitfall": ""}, {"type": "short", "points": 0, "question": "【大题10·综合】简述分页和分段的主要区别（至少4点），并说明段页式存储管理的地址转换过程。", "answer": -1, "explanation": "<strong>分页vs分段</strong>：\n①分页=物理划分(固定大小)，分段=逻辑划分(可变)\n②分页地址一维，分段地址二维(段号+偏移)\n③分页产生内部碎片，分段产生外部碎片\n④分页为系统管理服务，分段为用户应用服务\n\n<strong>段页式地址转换</strong>：逻辑地址→段表→页表→物理地址。先查段表得页表地址，再查页表得物理块号，加上页内偏移得物理地址。三次访存。TLB加速。", "pitfall": "段页式=分段+分页，取两者优点。但地址转换需要两次查表（段表+页表）。"}];
